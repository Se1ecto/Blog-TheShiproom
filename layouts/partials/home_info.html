{{- with site.Params.homeInfoParams }}
<article class="first-entry home-info">
    <header class="entry-header">
        {{- $logoOnDark := "images/logo_white.svg" | absURL }}
        {{- $logoOnLight := "images/logo_black.svg" | absURL }}
        <img id="siteLogoSplash" src="{{ $logoOnLight }}" alt="logo" aria-label="logo" height="500">
        <script>
            if (document.documentElement.dataset.theme === "dark")
                document.getElementById("siteLogoSplash").src = "{{ $logoOnDark }}";
        </script>
    </header>
    <div class="entry-content">
        {{ .Content | markdownify }}
    </div>
    <footer class="entry-footer">
        {{ partial "social_icons.html" (dict "align" site.Params.homeInfoParams.AlignSocialIconsTo) }}
    </footer>
</article>
{{- end -}}
<link rel="stylesheet" href="{{ "css/main.css" | absURL }}">
